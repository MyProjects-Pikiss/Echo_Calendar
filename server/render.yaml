services:
  - type: web
    name: echo-calendar-backend
    runtime: docker
    rootDir: server/backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8088
      - key: HOLIDAY_SYNC_ENABLED
        value: true
      - key: HOLIDAY_DB_PATH
        value: /var/data/holiday_cache.db
      - key: HOLIDAY_BOOTSTRAP_START_DATE
        value: 1970-01-01
      - key: HOLIDAY_BOOTSTRAP_FORWARD_YEARS
        value: 5
      - key: HOLIDAY_DAILY_WINDOW_YEARS
        value: 1
      - key: OPENAI_API_KEY
        sync: false
      - key: KOREA_HOLIDAY_API_KEY
        sync: false
      - key: KOREA_HOLIDAY_API_BASE_URL
        value: https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo
